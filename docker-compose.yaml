services:
  catalogue:
    build: ./catalogue
    image: satishlakamsani/catalogue:1.0.0
    container_name: catalogue
    depends_on:
    - mongodb 
  
  user:
    build: ./user
    image: satishlakamsani/user:1.0.0
    container_name: user
    depends_on:
    - redis
    - mongodb
  cart:
    build: ./cart
    image: satishlakamsani/cart:1.0.0
    container_name: cart
    depends_on:
    - redis
    - catalogue
  shipping:
    build: ./shipping
    image: satishlakamsani/shipping:1.0.0
    container_name: shipping
    depends_on:
      mysql:
       condition: service_healthy
      cart:
       condition: service_started

  payment:
    build: ./payment
    image: satishlakamsani/payment:1.0.0
    container_name: payment
    environment: 
      CART_HOST: "cart"
      CART_PORT: "8080"
      USER_HOST: "user"
      USER_PORT: "8080"
      AMQP_HOST: "rabbitmq"
      AMQP_USER: "roboshop"
      AMQP_PASS: "roboshop123"
    depends_on:
    - rabbitmq
    - cart
    - user
    
 
  frontend:
    build: ./frontend
    image: satishlakamsani/frontend:1.0.0
    container_name: frontend
    ports:
    - "80:80"
    depends_on:
    - catalogue
    - user
    - cart
    - shipping

  mongodb:
    build: ./mongodb  #it moves to mongodb directory
    image: satishlakamsani/mongodb:1.0.0 #docker build -t satishlakamsani/mongodb:1.0.0
    container_name: mongodb 
    volumes:
    - mongodb:/data/db
  redis:
    image: redis:7.0
    container_name: redis
    volumes:
    - redis:/data

  mysql:
    build: ./mysql
    image: satishlakamsani/mysql:1.0.0
    container_name: mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pRoboShop@1"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
    - mysql:/var/lib/mysql
  rabbitmq:
    image: rabbitmq:3
    environment: 
       RABBITMQ_DEFAULT_USER: roboshop
       RABBITMQ_DEFAULT_PASS: roboshop123
    container_name: rabbitmq
    volumes:
    - rabbitmq:/var/lib/rabbitmq

networks:
  default: 
    driver: bridge
    name: roboshop
    external: false #if true we have to create network manually

volumes:
 mongodb: #docker volume create mongodb
 redis:
 mysql:
 rabbitmq:

  
